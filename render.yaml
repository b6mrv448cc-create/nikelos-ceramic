services:
  - type: web
    name: nikelos-ceramic
    runtime: node
    region: frankfurt
    plan: free
    rootDir: packages/web
    buildCommand: "npm install -g bun@latest && bun install"
    startCommand: "bun run build && bun run start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
